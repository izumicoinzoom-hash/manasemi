<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マスターページ ログイン | マネゼミ</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-xl font-bold text-slate-800 mb-1">マスターページ</h1>
        <p class="text-slate-600 text-sm mb-6">編集用コードを入力してください</p>
        <form id="login-form" class="space-y-4">
            <div>
                <label for="code" class="block text-sm font-medium text-slate-700 mb-1">コード</label>
                <input type="password" id="code" name="code" autocomplete="off"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
                    placeholder="コードを入力" required>
            </div>
            <p id="error-msg" class="text-sm text-red-600 hidden"></p>
            <button type="submit" class="w-full py-2.5 bg-amber-600 hover:bg-amber-700 text-white font-medium rounded-lg transition">
                ログイン
            </button>
        </form>
        <p class="mt-6 text-center"><a href="index.html" class="text-sm text-slate-500 hover:text-amber-700">会員TOPに戻る</a></p>
    </div>
    <script src="master-config.js"></script>
    <script>
      (function() {
        var form = document.getElementById("login-form");
        var codeInput = document.getElementById("code");
        var errorMsg = document.getElementById("error-msg");
        var expected = window.MANASEMI_MASTER_CODE;
        if (!expected) expected = "";

        form.addEventListener("submit", function(e) {
          e.preventDefault();
          errorMsg.classList.add("hidden");
          var entered = (codeInput.value || "").trim();
          if (entered === expected) {
            try { sessionStorage.setItem("masterAuth", "1"); } catch (err) {}
            window.location.href = "master.html";
            return;
          }
          errorMsg.textContent = "コードが正しくありません。";
          errorMsg.classList.remove("hidden");
          codeInput.focus();
        });
      })();
    </script>
</body>
</html>
